name: Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install gpp and lua
        run: sudo apt-get install -y gpp lua5.4 liblua5.4-dev luarocks

      - name: Install LPEG
        run: sudo luarocks --lua-version=5.4 install lpeg

      - uses: ./.github/actions/setup

      - name: Run all tests
        run: eval "$(luarocks --lua-version=5.4 path)" && make test-all

  coverage-mock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install gpp
        run: sudo apt-get install -y gpp

      - uses: ./.github/actions/setup

      - name: Run mock coverage
        run: make coverage-mock

      - name: Upload mock coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lcov-mock
          path: lcov-mock.info

  coverage-prod:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install gpp
        run: sudo apt-get install -y gpp

      - uses: ./.github/actions/setup

      - name: Run prod coverage
        run: make coverage-prod

      - name: Upload prod coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lcov-prod
          path: lcov-prod.info

  coverage-report:
    runs-on: ubuntu-24.04
    needs: [coverage-mock, coverage-prod]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Download mock coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lcov-mock

      - name: Download prod coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lcov-prod

      - name: Generate coverage report
        run: make coverage-report

      - name: Show coverage summary
        run: cat coverage/coverage.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage
